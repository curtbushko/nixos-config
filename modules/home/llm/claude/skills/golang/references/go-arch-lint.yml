# go-arch-lint configuration for Hexagonal/Onion Architecture
# Generic template - customize components for your project
#
# Install: go install github.com/fe3dback/go-arch-lint@latest
# Usage:   go-arch-lint check
# Graph:   go-arch-lint graph

version: 3

# Allow all vendor imports (we only enforce component boundaries)
allow:
  depOnAnyVendor: true
  # Disable deep scan since cmd is the composition root and wires all components.
  # Deep scan incorrectly reports cross-layer deps when cmd does the wiring.
  deepScan: false

# Define architectural components
# Hexagonal Architecture Layers (inside-out):
#   1. Domain (innermost) - pure business logic, no dependencies
#   2. Ports - interfaces defining boundaries
#   3. Application - use cases/services orchestrating domain logic
#   4. Adapters (outermost) - infrastructure implementations
#   5. Pkg - public reusable packages (utilities, libraries)
components:
  # INNER LAYER: Domain (pure business logic)
  # Contains: entities, value objects, domain services, domain errors
  domain:
    in: internal/domain/**

  # INNER LAYER: Ports (interfaces)
  # Contains: repository interfaces, service interfaces, DTOs
  ports:
    in: internal/ports/**

  # APPLICATION LAYER: Use Cases/Services
  # Contains: application services that orchestrate domain logic
  application:
    in: internal/application/**

  # OUTER LAYER: Adapters (Infrastructure)
  # Contains: implementations of ports (repositories, clients, etc.)
  adapters:
    in: internal/adapters/**

  # Supporting: Configuration
  config:
    in: internal/config/**

  # COMPOSITION ROOT: Wires all dependencies together
  # Contains: main.go, dependency injection
  cmd:
    in: cmd/**

  # PUBLIC PACKAGES: Reusable library code
  # Contains: utility packages, shared libraries
  pkg:
    in: pkg/**

# Components that can be used by all other components
# Domain, ports, and pkg are foundational - everything can depend on them
commonComponents:
  - domain
  - ports
  - pkg

# Dependency rules - enforces hexagonal architecture constraints
# Key principle: dependencies point INWARD (adapters -> application -> ports -> domain)
deps:
  # Domain is pure - NO external dependencies (innermost layer)
  # Only standard library allowed
  domain:
    anyVendorDeps: true

  # Ports define interfaces - only depend on domain types (via commonComponents)
  ports:
    anyVendorDeps: true

  # Application layer uses ports to define behavior
  # Does NOT depend on adapters (dependency inversion)
  application:
    mayDependOn:
      - ports

  # Adapters implement ports - they depend on ports but not on each other
  # This is the outermost layer that connects to external systems
  adapters:
    mayDependOn:
      - ports

  # Config is standalone infrastructure concern
  config:
    anyVendorDeps: true

  # Cmd is the composition root - can depend on everything
  cmd:
    anyProjectDeps: true
    anyVendorDeps: true

  # Pkg is standalone - can depend on vendor libs but not internal components
  pkg:
    anyVendorDeps: true

# Exclude test files from analysis
excludeFiles:
  - _test\.go$
  - mock_.*\.go$
  - /mocks/
  - /testdata/
